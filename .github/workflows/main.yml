name: CI/CD Pipeline - ACEest Fitness API

on:
  push:
    branches:
      - main
      - develop
  pull_request:
    branches:
      - main
      - develop

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  # ========================================================================
  # STAGE 1: BUILD & LINT
  # ========================================================================
  build-and-lint:
    name: Build & Lint
    runs-on: ubuntu-latest
    
    strategy:
      matrix:
        python-version: ['3.10', '3.11']
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v3
      
      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v4
        with:
          python-version: ${{ matrix.python-version }}
          cache: 'pip'
      
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pylint flake8 black isort
      
      - name: Run Black formatter check
        run: |
          black --check app.py tests/ || true
      
      - name: Run isort import check
        run: |
          isort --check-only app.py tests/ || true
      
      - name: Run Flake8 linter
        run: |
          flake8 app.py tests/ --max-line-length=100 --extend-ignore=E203,W503 || true
      
      - name: Run Pylint
        run: |
          pylint app.py --disable=all --enable=E,F || true
      
      - name: Syntax check
        run: |
          python -m py_compile app.py
          python -m py_compile tests/test_app.py

  # ========================================================================
  # STAGE 2: UNIT TESTS
  # ========================================================================
  test:
    name: Unit Tests
    runs-on: ubuntu-latest
    needs: build-and-lint
    
    strategy:
      matrix:
        python-version: ['3.10', '3.11']
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v3
      
      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v4
        with:
          python-version: ${{ matrix.python-version }}
          cache: 'pip'
      
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
      
      - name: Run pytest with coverage
        run: |
          pytest tests/ -v --cov=app --cov-report=xml --cov-report=html --cov-report=term
      
      - name: Upload coverage reports
        uses: codecov/codecov-action@v3
        with:
          files: ./coverage.xml
          flags: unittests
          name: codecov-umbrella
          fail_ci_if_error: false
      
      - name: Upload HTML coverage report
        uses: actions/upload-artifact@v3
        if: always()
        with:
          name: coverage-report-py${{ matrix.python-version }}
          path: htmlcov/
          retention-days: 7

  # ========================================================================
  # STAGE 3: DOCKER BUILD
  # ========================================================================
  docker-build:
    name: Docker Image Build
    runs-on: ubuntu-latest
    needs: test
    
    permissions:
      contents: read
      packages: write
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v3
      
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v2
      
      - name: Log in to Container Registry
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v2
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      
      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v4
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=ref,event=branch
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=sha
      
      - name: Build and push Docker image
        uses: docker/build-push-action@v4
        with:
          context: .
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ========================================================================
  # STAGE 4: DOCKER TESTS
  # ========================================================================
  docker-test:
    name: Docker Container Tests
    runs-on: ubuntu-latest
    needs: docker-build
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v3
      
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v2
      
      - name: Build Docker image for testing
        uses: docker/build-push-action@v4
        with:
          context: .
          push: false
          load: true
          tags: aceest-test:latest
          cache-from: type=gha
      
      - name: Test container startup
        run: |
          docker run --rm -d -p 5000:5000 --name aceest-test aceest-test:latest
          sleep 5
          docker ps | grep aceest-test
          curl -f http://localhost:5000/health || exit 1
          docker stop aceest-test
      
      - name: Run pytest inside container
        run: |
          docker run --rm \
            -v ${{ github.workspace }}/tests:/app/tests \
            -e DATABASE_PATH=/tmp/test.db \
            aceest-test:latest \
            sh -c "pip install pytest pytest-cov && pytest tests/ -v"

  # ========================================================================
  # STAGE 5: SECURITY SCAN (Optional)
  # ========================================================================
  security:
    name: Security Scanning
    runs-on: ubuntu-latest
    needs: build-and-lint
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v3
      
      - name: Run Trivy vulnerability scanner
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: 'config'
          scan-ref: '.'
          format: 'sarif'
          output: 'trivy-results.sarif'
      
      - name: Upload Trivy results to GitHub Security tab
        uses: github/codeql-action/upload-sarif@v2
        if: always()
        with:
          sarif_file: 'trivy-results.sarif'

  # ========================================================================
  # STAGE 6: BUILD SUCCESS NOTIFICATION
  # ========================================================================
  build-success:
    name: Build Success
    runs-on: ubuntu-latest
    needs: [build-and-lint, test, docker-build, docker-test]
    if: success()
    
    steps:
      - name: Build Successful
        run: echo "✅ All CI/CD stages completed successfully!"

  build-failure:
    name: Build Failure Notification
    runs-on: ubuntu-latest
    needs: [build-and-lint, test, docker-build, docker-test]
    if: failure()
    
    steps:
      - name: Build Failed
        run: |
          echo "❌ CI/CD Pipeline Failed!"
          exit 1
