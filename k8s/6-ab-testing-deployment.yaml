---
# A/B TESTING DEPLOYMENT STRATEGY
# Two deployments serving different user groups
apiVersion: apps/v1
kind: Deployment
metadata:
  name: aceest-variant-a
  namespace: aceest-fitness
  labels:
    app: aceest-fitness
    ab-test: "true"
    variant: a
    version: "1.0.0"
spec:
  replicas: 2
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  selector:
    matchLabels:
      app: aceest-fitness
      ab-test: "true"
      variant: a
  template:
    metadata:
      labels:
        app: aceest-fitness
        ab-test: "true"
        variant: a
        version: "1.0.0"
    spec:
      containers:
      - name: aceest-fitness
        image: ghcr.io/ameya-dikshit/aceest-fitness:v1.0
        imagePullPolicy: Always
        ports:
        - containerPort: 5000
          name: http
        envFrom:
        - configMapRef:
            name: aceest-config
        env:
        - name: VARIANT
          value: "a"
        - name: EXPERIMENT_ID
          value: "ab-test-001"
        resources:
          requests:
            memory: "128Mi"
            cpu: "100m"
          limits:
            memory: "512Mi"
            cpu: "500m"
        livenessProbe:
          httpGet:
            path: /health
            port: 5000
          initialDelaySeconds: 30
          periodSeconds: 10
          timeoutSeconds: 5
          failureThreshold: 3
        readinessProbe:
          httpGet:
            path: /health
            port: 5000
          initialDelaySeconds: 10
          periodSeconds: 5
          timeoutSeconds: 3
          failureThreshold: 2
        volumeMounts:
        - name: app-storage
          mountPath: /app/data
      volumes:
      - name: app-storage
        emptyDir: {}
---
# Variant B for A/B Testing
apiVersion: apps/v1
kind: Deployment
metadata:
  name: aceest-variant-b
  namespace: aceest-fitness
  labels:
    app: aceest-fitness
    ab-test: "true"
    variant: b
    version: "1.1.0"
spec:
  replicas: 2
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  selector:
    matchLabels:
      app: aceest-fitness
      ab-test: "true"
      variant: b
  template:
    metadata:
      labels:
        app: aceest-fitness
        ab-test: "true"
        variant: b
        version: "1.1.0"
    spec:
      containers:
      - name: aceest-fitness
        image: ghcr.io/ameya-dikshit/aceest-fitness:v2.0
        imagePullPolicy: Always
        ports:
        - containerPort: 5000
          name: http
        envFrom:
        - configMapRef:
            name: aceest-config
        env:
        - name: VARIANT
          value: "b"
        - name: EXPERIMENT_ID
          value: "ab-test-001"
        resources:
          requests:
            memory: "128Mi"
            cpu: "100m"
          limits:
            memory: "512Mi"
            cpu: "500m"
        livenessProbe:
          httpGet:
            path: /health
            port: 5000
          initialDelaySeconds: 30
          periodSeconds: 10
          timeoutSeconds: 5
          failureThreshold: 3
        readinessProbe:
          httpGet:
            path: /health
            port: 5000
          initialDelaySeconds: 10
          periodSeconds: 5
          timeoutSeconds: 3
          failureThreshold: 2
        volumeMounts:
        - name: app-storage
          mountPath: /app/data
      volumes:
      - name: app-storage
        emptyDir: {}
---
# Service for A/B Test - routes to both variants
apiVersion: v1
kind: Service
metadata:
  name: aceest-ab-test-service
  namespace: aceest-fitness
  labels:
    app: aceest-fitness
    ab-test: "true"
spec:
  type: LoadBalancer
  ports:
    - port: 80
      targetPort: 5000
      protocol: TCP
      name: http
  selector:
    app: aceest-fitness
    ab-test: "true"
