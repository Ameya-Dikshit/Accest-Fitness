# SonarQube Project Configuration
sonar.projectKey=aceest-fitness
sonar.projectName=ACEest Fitness Application
sonar.projectVersion=1.0.0

# Source code directory
sonar.sources=.
sonar.exclusions=**/*test*,**/tests/**,venv/**,__pycache__/**,*.pyc

# Python specific settings
sonar.python.file.suffixes=.py
sonar.python.coverage.reportPaths=coverage.xml

# Main language
sonar.language=py

# Test settings
sonar.tests=tests
sonar.test.inclusions=tests/**/*test*.py,tests/**/*_test.py

# Code coverage
sonar.python.xunit.reportPath=pytest-results.xml

# Encoding
sonar.sourceEncoding=UTF-8

# Server connection (will be overridden by Jenkins)
sonar.host.url=http://localhost:9000
sonar.login=admin
sonar.password=admin

# Quality Gates
sonar.qualitygate.wait=true
